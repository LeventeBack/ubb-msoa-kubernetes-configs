apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-app-secret
  namespace: default
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: demo-app-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: demo-app
        property: db-username
    - secretKey: password
      remoteRef:
        key: demo-app
        property: db-password
    - secretKey: api-token
      remoteRef:
        key: demo-app
        property: api-token
